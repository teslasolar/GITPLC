<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🔧 GitPLC — Universal PLC Namespace</title>
<link rel="stylesheet" href="ui/style.css">
</head>
<body>
<div class="hdr">
  <span class="logo">🔧 GitPLC</span>
  <span class="b">│</span>
  <span class="tab active" data-tab="explorer" onclick="switchView('explorer')">📂</span>
  <span class="tab" data-tab="programs" onclick="switchView('programs')">⚙</span>
  <span class="tab" data-tab="alarms" onclick="switchView('alarms')">🚨</span>
  <span class="tab" data-tab="kpi" onclick="switchView('kpi')">📊</span>
  <span class="tab" data-tab="tags" onclick="switchView('tags')">🏷</span>
  <span style="flex:1"></span>
  <span id="status" class="ok">loading...</span>
</div>
<div class="dock">
  <div class="side" id="tree-panel"></div>
  <div class="main" id="main-panel"></div>
  <div class="detail" id="detail-panel"></div>
</div>
<div class="ftr">
  <span>🔧 GitPLC · ISA-88/95 · PackML · OPC-UA · MQTT · Modbus</span>
  <span style="flex:1"></span>
  <span id="stats"></span>
</div>

<!-- loaders -->
<script src="loaders/template-loader.js"></script>
<script src="loaders/subdir-scanner.js"></script>

<!-- engine -->
<script src="engine/tag-db.js"></script>
<script src="engine/udt-loader.js"></script>
<script src="engine/tree.js"></script>

<!-- ui -->
<script src="ui/views.js"></script>
<script src="ui/detail.js"></script>

<!-- boot -->
<script src="app.js"></script>
</body></html>
